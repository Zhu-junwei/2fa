<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#0f9f8f">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <title>2FA TOTP 工具</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fa;
      --surface: #ffffff;
      --surface-soft: #f1f4f6;
      --line: #dfe5e8;
      --line-strong: #cbd5da;
      --text: #111827;
      --muted: #64717c;
      --subtle: #8a96a0;
      --accent: #0f9f8f;
      --accent-soft: #dff8f4;
      --danger: #dc2626;
      --shadow: 0 16px 48px rgba(29, 41, 57, 0.08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    [hidden] {
      display: none !important;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      background: none;
      cursor: pointer;
    }

    .app {
      width: min(920px, calc(100% - 28px));
      margin: 0 auto;
      padding: clamp(42px, 9vh, 86px) 0 40px;
    }

    .hero {
      display: grid;
      justify-items: center;
      gap: 18px;
      margin-bottom: 18px;
      text-align: center;
    }

    .brand-icon {
      width: 58px;
      height: 58px;
      display: block;
      border-radius: 16px;
      box-shadow: 0 14px 34px rgba(15, 118, 110, 0.22);
    }

    .brand {
      margin: 0;
      font-size: clamp(34px, 8vw, 64px);
      line-height: 1;
      letter-spacing: 0;
      font-weight: 760;
    }

    .search-wrap {
      position: relative;
      width: min(680px, 100%);
    }

    .api-link {
      height: 34px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: var(--surface);
    }

    .api-link:hover {
      color: var(--text);
      border-color: var(--line-strong);
    }

    .home-footer {
      width: min(680px, 100%);
      margin: 18px auto 0;
      display: grid;
      justify-items: center;
      gap: 8px;
      color: var(--subtle);
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
    }

    .footer-tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 6px;
    }

    .feature-tag {
      min-height: 26px;
      display: inline-flex;
      align-items: center;
      padding: 0 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.72);
    }

    .footer-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .footer-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 32px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: var(--surface);
      text-decoration: none;
    }

    .footer-link:hover {
      color: var(--text);
      border-color: var(--line-strong);
    }

    .github-mark {
      width: 18px;
      height: 18px;
      fill: currentColor;
      stroke: none;
    }

    .search-input {
      width: 100%;
      height: 56px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0 138px 0 22px;
      outline: none;
      color: var(--text);
      background: var(--surface);
      box-shadow: var(--shadow);
      transition: border-color 140ms ease, box-shadow 140ms ease;
    }

    .search-input:focus {
      border-color: var(--line-strong);
      box-shadow: 0 18px 54px rgba(29, 41, 57, 0.12);
    }

    .search-actions {
      position: absolute;
      top: 50%;
      right: 10px;
      display: flex;
      align-items: center;
      gap: 4px;
      transform: translateY(-50%);
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      display: inline-grid;
      place-items: center;
      border-radius: 999px;
      color: var(--muted);
      transition: background 140ms ease, color 140ms ease, transform 140ms ease;
    }

    .icon-btn:hover {
      color: var(--text);
      background: var(--surface-soft);
    }

    .icon-btn:active {
      transform: scale(0.96);
    }

    .icon-btn.danger:hover {
      color: var(--danger);
      background: #fee2e2;
    }

    .icon-btn:disabled {
      cursor: not-allowed;
      color: var(--subtle);
      opacity: 0.45;
    }

    .icon-btn:disabled:hover {
      color: var(--subtle);
      background: none;
    }

    .icon {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      pointer-events: none;
    }

    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip-path: inset(50%);
      opacity: 0;
      pointer-events: none;
    }

    .current {
      width: min(680px, 100%);
      margin: 0 auto 22px;
      min-height: 188px;
    }

    .current-card {
      display: grid;
      gap: 12px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--surface);
      box-shadow: var(--shadow);
      transition: border-color 700ms ease, box-shadow 700ms ease, background-color 700ms ease;
    }

    .current-card.urgent {
      border-color: rgba(220, 38, 38, 0.44);
      background: #fffafa;
      box-shadow: 0 18px 54px rgba(220, 38, 38, 0.14);
    }

    .empty {
      padding: 30px 18px;
      color: var(--muted);
      text-align: center;
      line-height: 1.65;
      border: 1px dashed var(--line-strong);
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.68);
    }

    .meta-line {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
    }

    .info-stack {
      min-width: 0;
      display: grid;
      gap: 6px;
    }

    .identity {
      min-width: 0;
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .identity strong,
    .identity span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .identity strong {
      font-size: 16px;
    }

    .identity span {
      color: var(--muted);
      font-size: 13px;
    }

    .secret-line {
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      letter-spacing: 0;
      text-align: left;
      user-select: none;
      border-radius: 8px;
      transition: color 140ms ease, text-shadow 140ms ease;
    }

    .secret-line:hover {
      color: var(--accent);
      text-shadow: 0 0 0 currentColor;
    }

    .secret-line.copied {
      color: #047857;
      text-shadow: 0.35px 0 0 currentColor;
    }

    .quick-actions {
      display: flex;
      gap: 4px;
    }

    .code-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 138px;
      gap: 14px;
      align-items: center;
    }

    .totp-code {
      width: 100%;
      min-height: 76px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      color: var(--text);
      background: #f8fafb;
      border: 1px solid var(--line);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: clamp(42px, 10vw, 66px);
      font-weight: 760;
      line-height: 1;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: color 700ms ease, border-color 700ms ease, background-color 700ms ease, box-shadow 700ms ease;
    }

    .current-card.urgent .totp-code {
      color: var(--danger);
      border-color: rgba(220, 38, 38, 0.5);
      background: #fff1f2;
      box-shadow: inset 0 0 0 1px rgba(220, 38, 38, 0.08);
    }

    .totp-code:hover {
      color: var(--accent);
      border-color: rgba(15, 159, 143, 0.48);
      background: #effdfa;
      box-shadow: 0 14px 28px rgba(15, 159, 143, 0.12);
      transform: translateY(-1px);
    }

    .totp-code:active {
      transform: translateY(0);
      box-shadow: inset 0 0 0 1px rgba(15, 159, 143, 0.1);
    }

    .current-card.urgent .totp-code:hover {
      color: var(--danger);
      border-color: rgba(220, 38, 38, 0.58);
      background: #ffe4e6;
      box-shadow: 0 14px 28px rgba(220, 38, 38, 0.14);
    }

    .timer {
      display: grid;
      gap: 8px;
      align-content: center;
      min-height: 76px;
    }

    .timer-top {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      transition: color 700ms ease;
    }

    .current-card.urgent .timer-top,
    .current-card.urgent .hint {
      color: var(--danger);
    }

    .bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: var(--surface-soft);
    }

    .bar-fill {
      height: 100%;
      width: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #34d399);
      transform-origin: left center;
      transform: scaleX(var(--progress, 0));
      will-change: transform;
      transition: background 700ms ease;
    }

    .current-card.urgent .bar-fill {
      background: linear-gradient(90deg, #ef4444, var(--danger));
    }

    .hint {
      color: var(--subtle);
      font-size: 12px;
    }

    .history {
      width: min(560px, 100%);
      margin: 0 auto;
    }

    .history-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      padding: 10px 2px;
      color: var(--muted);
      font-size: 13px;
    }

    .history-head h2 {
      margin: 0;
      color: var(--text);
      font-size: 15px;
      font-weight: 720;
    }

    .history-tools {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .history-tools .icon-btn {
      width: 30px;
      height: 30px;
    }

    .history-tools .icon {
      width: 17px;
      height: 17px;
    }

    .records {
      display: grid;
      gap: 6px;
    }

    .record {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) 92px 128px;
      gap: 6px;
      align-items: center;
      min-height: 48px;
      padding: 6px 6px 6px 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--surface);
      transition: border-color 140ms ease, background-color 140ms ease, box-shadow 140ms ease, transform 140ms ease;
    }

    .record.active {
      border-color: rgba(15, 159, 143, 0.34);
      background: linear-gradient(0deg, rgba(15, 159, 143, 0.05), rgba(15, 159, 143, 0.05)), var(--surface);
    }

    .record:hover {
      border-color: rgba(15, 159, 143, 0.42);
      background: linear-gradient(0deg, rgba(15, 159, 143, 0.07), rgba(15, 159, 143, 0.07)), var(--surface);
      box-shadow: 0 10px 24px rgba(15, 159, 143, 0.08);
      transform: translateY(-1px);
    }

    .record.active:hover {
      border-color: rgba(15, 159, 143, 0.56);
      background: linear-gradient(0deg, rgba(15, 159, 143, 0.1), rgba(15, 159, 143, 0.1)), var(--surface);
    }

    .record-info {
      min-width: 0;
      display: grid;
      gap: 1px;
    }

    .record-title {
      min-width: 0;
      display: grid;
      gap: 1px;
      text-align: left;
      color: inherit;
    }

    .record-title strong,
    .record-title span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .record-title strong {
      font-size: 14px;
      font-weight: 690;
    }

    .record-title span {
      color: var(--muted);
      font-size: 12px;
    }

    .record-secret {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 11px;
      letter-spacing: 0;
      text-align: left;
      user-select: none;
      border-radius: 7px;
      transition: color 140ms ease, text-shadow 140ms ease;
    }

    .record-secret:hover {
      color: var(--accent);
      text-shadow: 0 0 0 currentColor;
    }

    .record-secret.copied {
      color: #047857;
      text-shadow: 0.35px 0 0 currentColor;
    }

    .mini-code {
      min-height: 36px;
      border-radius: 10px;
      color: var(--text);
      background: #f8fafb;
      border: 1px solid var(--line);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0;
      font-variant-numeric: tabular-nums;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: color 700ms ease, border-color 700ms ease, background-color 700ms ease;
    }

    .record.urgent .mini-code {
      color: var(--danger);
      border-color: rgba(220, 38, 38, 0.46);
      background: #fff1f2;
    }

    .mini-code:hover {
      color: var(--accent);
      border-color: rgba(15, 159, 143, 0.46);
      background: #effdfa;
      transform: translateY(-1px);
    }

    .mini-code:active {
      transform: translateY(0);
    }

    .record.urgent .mini-code:hover {
      color: var(--danger);
      border-color: rgba(220, 38, 38, 0.56);
      background: #ffe4e6;
    }

    .record-actions {
      display: flex;
      justify-content: flex-end;
      gap: 1px;
    }

    .record-actions .icon-btn {
      width: 30px;
      height: 32px;
    }

    .record-actions .icon {
      width: 17px;
      height: 17px;
    }

    .toast {
      position: fixed;
      left: 50%;
      top: 18px;
      z-index: 40;
      width: max-content;
      max-width: calc(100% - 28px);
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -14px);
      transition: opacity 150ms ease, transform 150ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(17, 24, 39, 0.32);
    }

    .modal.open {
      display: grid;
    }

    .qr-panel,
    .scan-panel {
      width: min(360px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      padding: 18px;
      border-radius: 18px;
      background: var(--surface);
      box-shadow: 0 24px 80px rgba(17, 24, 39, 0.2);
    }

    .scan-panel {
      width: min(420px, 100%);
    }

    .scan-video-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #111827;
    }

    .scan-video-wrap::after {
      content: "";
      position: absolute;
      inset: 18%;
      border: 2px solid rgba(255, 255, 255, 0.78);
      border-radius: 18px;
      box-shadow: 0 0 0 999px rgba(17, 24, 39, 0.16);
      pointer-events: none;
    }

    .scan-video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }

    .edit-panel,
    .confirm-panel {
      width: min(420px, 100%);
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      padding: 18px;
      border-radius: 18px;
      background: var(--surface);
      box-shadow: 0 24px 80px rgba(17, 24, 39, 0.2);
    }

    .confirm-panel p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .qr-head {
      min-width: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .qr-head strong {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .field-grid {
      display: grid;
      gap: 10px;
    }

    .field-grid label {
      display: grid;
      gap: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .field-grid input,
    .field-grid select {
      width: 100%;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 0 10px;
      outline: none;
      color: var(--text);
      background: #fff;
    }

    .edit-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .text-btn {
      height: 36px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--text);
      background: var(--surface-soft);
    }

    .text-btn.primary {
      color: #fff;
      border-color: var(--accent);
      background: var(--accent);
    }

    .copy-list {
      min-width: 0;
      max-width: 100%;
      justify-self: stretch;
      display: grid;
      gap: 8px;
    }

    .copy-row {
      min-width: 0;
      max-width: 100%;
      justify-self: stretch;
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      min-height: 34px;
      padding: 7px 9px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: inherit;
      background: #f8fafb;
      text-align: left;
    }

    .copy-row span {
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
    }

    .copy-row code {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }

    .home-view.hidden,
    .api-view {
      display: none;
    }

    .api-view.active {
      width: min(720px, 100%);
      margin: 0 auto;
      display: grid;
      gap: 14px;
    }

    .api-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .api-top h2 {
      margin: 0;
      font-size: 22px;
    }

    .api-card {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .api-card h3 {
      margin: 0;
      font-size: 15px;
    }

    .api-card p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .code-box {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #f8fafb;
    }

    .code-box pre {
      margin: 0;
      overflow-x: auto;
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #qrCanvas {
      width: 100%;
      max-width: 300px;
      height: auto;
      display: block;
      justify-self: center;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px;
      background: #fff;
    }

    @media (max-width: 640px) {
      .app {
        width: min(100% - 18px, 920px);
        padding-top: 34px;
      }

      .search-input {
        height: 52px;
        padding-left: 18px;
        padding-right: 124px;
      }

      .current-card {
        padding: 12px;
      }

      .code-row,
      .record {
        grid-template-columns: minmax(0, 1fr);
      }

      .timer {
        min-height: auto;
      }

      .record {
        gap: 6px;
      }

      .record-actions {
        justify-content: flex-start;
      }

      .mini-code {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <div id="homeView" class="home-view">
    <section class="hero" aria-label="导入 2FA">
      <img class="brand-icon" src="favicon.svg" width="58" height="58" alt="" aria-hidden="true">
      <h1 class="brand">2FA TOTP</h1>
      <div class="search-wrap">
        <input id="secretInput" class="search-input" spellcheck="false" autocomplete="off" placeholder="输入或粘贴 Secret / otpauth">
        <div class="search-actions">
          <button id="scanBtn" class="icon-btn" type="button" title="扫描二维码" aria-label="扫描二维码">

  <script>
    const STORAGE_KEY = 'totp-records-v1';
    const JSQR_URL = 'https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js';
    const QR_CODE_URL = 'https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js';
    const state = {
      records: [],
      activeId: null,
      codes: new Map(),
      toastTimer: null,
      raf: 0,
      renderedSecond: -1,
      editId: null,
      scanStream: null,
      scanRaf: 0,
      scanDetector: null,
      scanBusy: false,
      scanToken: 0
    };

    const icons = {
      share: '<svg class="icon" viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><path d="m8.6 13.5 6.8 4"></path><path d="m15.4 6.5-6.8 4"></path></svg>',
      qr: '<svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect><path d="M14 14h2v2h-2z"></path><path d="M18 14h3v3"></path><path d="M14 18h3v3"></path><path d="M20 20h1v1h-1z"></path></svg>',
      edit: '<svg class="icon" viewBox="0 0 24 24"><path d="M12 20h9"></path><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path></svg>',
      copy: '<svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"></rect><rect x="2" y="2" width="13" height="13" rx="2"></rect></svg>',
      trash: '<svg class="icon" viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="m19 6-1 14H6L5 6"></path><path d="M10 11v5"></path><path d="M14 11v5"></path></svg>'
    };

    const els = {
      input: document.getElementById('secretInput'),
      homeView: document.getElementById('homeView'),
      apiView: document.getElementById('apiView'),
      apiLink: document.getElementById('apiLink'),
      backHome: document.getElementById('backHome'),
      apiExamples: document.getElementById('apiExamples'),
      parseBtn: document.getElementById('parseBtn'),
      scanBtn: document.getElementById('scanBtn'),
      imageBtn: document.getElementById('imageBtn'),
      qrInput: document.getElementById('qrInput'),
      cameraInput: document.getElementById('cameraInput'),
      currentPanel: document.getElementById('currentPanel'),
      records: document.getElementById('records'),
      recordCount: document.getElementById('recordCount'),
      clearRecords: document.getElementById('clearRecords'),
      exportRecords: document.getElementById('exportRecords'),
      toast: document.getElementById('toast'),
      qrModal: document.getElementById('qrModal'),
      qrCanvas: document.getElementById('qrCanvas'),
      qrTitle: document.getElementById('qrTitle'),
      qrClose: document.getElementById('qrClose'),
      qrSecret: document.getElementById('qrSecret'),
      qrOtpAuth: document.getElementById('qrOtpAuth'),
      editModal: document.getElementById('editModal'),
      editForm: document.getElementById('editForm'),
      editClose: document.getElementById('editClose'),
      editCancel: document.getElementById('editCancel'),
      editLabel: document.getElementById('editLabel'),
      editIssuer: document.getElementById('editIssuer'),
      editSecret: document.getElementById('editSecret'),
      editDigits: document.getElementById('editDigits'),
      editPeriod: document.getElementById('editPeriod'),
      editAlgorithm: document.getElementById('editAlgorithm'),
      clearModal: document.getElementById('clearModal'),
      clearClose: document.getElementById('clearClose'),
      clearCancel: document.getElementById('clearCancel'),
      clearConfirm: document.getElementById('clearConfirm'),
      scanModal: document.getElementById('scanModal'),
      scanClose: document.getElementById('scanClose'),
      scanVideo: document.getElementById('scanVideo'),
      scanStatus: document.getElementById('scanStatus')
    };

    init();

    function init() {
      state.records = loadRecords();
      state.activeId = state.records[0]?.id || null;
      bindEvents();
      importFromUrl();
      render();
      renderRoute();
      state.raf = requestAnimationFrame(animate);
    }

    function bindEvents() {
      els.apiLink.addEventListener('click', () => {
        window.location.hash = 'api';
      });
      els.backHome.addEventListener('click', () => {
        window.location.hash = '';
      });
      window.addEventListener('hashchange', renderRoute);
      els.parseBtn.addEventListener('click', () => addFromText(els.input.value));
      els.input.addEventListener('paste', handleInputPaste);
      els.input.addEventListener('keydown', handleInputKeydown);
      els.scanBtn.addEventListener('click', openScanModal);
      els.imageBtn.addEventListener('click', () => openFilePicker(els.qrInput));
      els.clearRecords.addEventListener('click', openClearModal);
      els.exportRecords.addEventListener('click', exportAllRecords);
      els.qrInput.addEventListener('change', handleQrUpload);
      els.cameraInput.addEventListener('change', handleQrUpload);
      els.scanClose.addEventListener('click', closeScanModal);
      els.scanModal.addEventListener('click', (event) => {
        if (event.target === els.scanModal) closeScanModal();
      });
      els.qrClose.addEventListener('click', closeQrModal);
      els.qrSecret.addEventListener('click', () => copyText(els.qrSecret.dataset.value || '').then(() => {
        flashCopied(els.qrSecret);
        showToast('Secret 已复制');
      }));
      els.qrOtpAuth.addEventListener('click', () => copyText(els.qrOtpAuth.dataset.value || '').then(() => showToast('otpauth 已复制')));
      els.qrModal.addEventListener('click', (event) => {
        if (event.target === els.qrModal) closeQrModal();
      });
      els.editClose.addEventListener('click', closeEditModal);
      els.editCancel.addEventListener('click', closeEditModal);
      els.editForm.addEventListener('submit', saveEditForm);
      els.editModal.addEventListener('click', (event) => {
        if (event.target === els.editModal) closeEditModal();
      });
      els.clearClose.addEventListener('click', closeClearModal);
      els.clearCancel.addEventListener('click', closeClearModal);
      els.clearConfirm.addEventListener('click', clearAllRecords);
      els.clearModal.addEventListener('click', (event) => {
        if (event.target === els.clearModal) closeClearModal();
      });
      document.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') {
          closeScanModal();
          closeQrModal();
          closeEditModal();
          closeClearModal();
        }
      });
    }

    function handleInputPaste(event) {
      const text = event.clipboardData?.getData('text') || '';
      try {
        if (splitBatchInput(text).length <= 1) return;
        event.preventDefault();
        addFromText(text);
      } catch {
        return;
      }
    }

    function handleInputKeydown(event) {
      if (event.key !== 'Enter' || event.isComposing) return;
      event.preventDefault();
      addFromText(els.input.value);
    }

    async function animate() {
      const now = Date.now();
      const active = getActiveRecord();
      if (active) {
        const elapsed = (now / 1000) % active.period;
        const remaining = Math.max(0, active.period - elapsed);
        document.documentElement.style.setProperty('--progress', String(remaining / active.period));
        const second = Math.ceil(remaining);
        const timerText = document.getElementById('timerText');
        if (timerText) timerText.textContent = `${String(second).padStart(2, '0')}s`;

        const wholeSecond = Math.floor(now / 1000);
        if (wholeSecond !== state.renderedSecond) {
          state.renderedSecond = wholeSecond;
          await refreshCodes(now);
          updateDynamicCodeViews(now);
        }
      }
      state.raf = requestAnimationFrame(animate);
    }

    async function refreshCodes(now = Date.now()) {
      await Promise.all(state.records.map(async (record) => {
        try {
          const code = await generateTotp(record.secret, record, now);
          state.codes.set(record.id, code);
        } catch {
          state.codes.set(record.id, '错误');
        }
      }));
    }

    function updateDynamicCodeViews(now = Date.now()) {
      const active = getActiveRecord();
      if (active) {
        const currentCard = els.currentPanel.querySelector('.current-card');
        currentCard?.classList.toggle('urgent', getRemainingSeconds(active, now) <= 5);

        const currentCode = els.currentPanel.querySelector('.totp-code[data-action="copy-code"]');
        if (currentCode) {
          currentCode.textContent = state.codes.get(active.id) || ''.padStart(active.digits || 6, '·');
        }
      }

      els.records.querySelectorAll('.record').forEach((recordEl) => {
        const codeButton = recordEl.querySelector('.mini-code[data-action="copy-code"]');
        const record = state.records.find((item) => item.id === codeButton?.dataset.id);
        if (!record || !codeButton) return;

        recordEl.classList.toggle('urgent', getRemainingSeconds(record, now) <= 5);
        codeButton.textContent = state.codes.get(record.id) || ''.padStart(record.digits || 6, '·');
      });
    }

    function addFromText(raw) {
      try {
        const inputs = splitBatchInput(raw);
        let successCount = 0;
        const errors = [];

        inputs.forEach((input) => {
          try {
            saveRecord(parseInput(input), { render: false });
            successCount += 1;
          } catch (error) {
            errors.push(error);
          }
        });

        if (!successCount) {
          throw errors[0] || new Error('无法解析输入');
        }

        els.input.value = '';
        persistRecords();
        render();

        if (inputs.length === 1) {
          showToast('已解析');
        } else if (errors.length) {
          showToast(`已解析 ${successCount} 条，${errors.length} 条失败`);
        } else {
          showToast(`已解析 ${successCount} 条`);
        }
      } catch (error) {
        showToast(error.message || '无法解析输入');
      }
    }

    function splitBatchInput(raw) {
      const text = String(raw || '').trim();
      if (!text) throw new Error('请输入 Secret 或 otpauth 链接');

      const otpAuthMatches = text.match(/otpauth:\/\/\S+/gi);
      if (otpAuthMatches?.length > 1) {
        return otpAuthMatches.map(cleanBatchItem);
      }

      const lines = text
        .split(/\r?\n/)
        .map(cleanBatchItem)
        .filter(Boolean);

      return lines.length ? lines : [text];
    }

    function cleanBatchItem(value) {
      return String(value || '')
        .trim()
        .replace(/^[\s>*-]*\d+[.)、]\s*/, '')
        .replace(/^[\s>*-]+/, '')
        .replace(/[，,;；]+$/, '')
        .trim();
    }

    function saveRecord(record, options = {}) {
      const normalized = {
        id: record.id || crypto.randomUUID(),
        label: record.label || '',
        issuer: record.issuer || '',
        secret: normalizeSecret(record.secret),
        algorithm: (record.algorithm || 'SHA1').toUpperCase(),
        digits: Number(record.digits || 6),
        period: Number(record.period || 30),
        addedAt: record.addedAt || new Date().toISOString()
      };

      assertSecret(normalized.secret);
      if (![6, 7, 8].includes(normalized.digits)) normalized.digits = 6;
      if (!Number.isFinite(normalized.period) || normalized.period < 10) normalized.period = 30;
      if (!['SHA1', 'SHA256', 'SHA512'].includes(normalized.algorithm)) normalized.algorithm = 'SHA1';

      const key = recordKey(normalized);
      const existingIndex = state.records.findIndex((item) => recordKey(item) === key);
      if (existingIndex >= 0) {
        normalized.id = state.records[existingIndex].id;
        normalized.addedAt = state.records[existingIndex].addedAt;
        state.records.splice(existingIndex, 1, normalized);
      } else {
        state.records.unshift(normalized);
      }

      state.activeId = normalized.id;
      state.renderedSecond = -1;
      if (options.render !== false) {
        persistRecords();
        render();
      }
    }

    function deleteRecord(id) {
      state.records = state.records.filter((item) => item.id !== id);
      if (state.activeId === id) state.activeId = state.records[0]?.id || null;
      state.codes.delete(id);
      persistRecords();
      render();
      showToast('已删除');
    }

    function setActive(id) {
      state.activeId = id;
      state.renderedSecond = -1;
      render();
    }

    function render() {
      renderCurrent();
      renderRecords();
      renderApiExamples();
      els.recordCount.textContent = `${state.records.length} 条`;
      els.clearRecords.disabled = !state.records.length;
      els.exportRecords.hidden = !state.records.length;
      if (!state.records.length) closeClearModal();
    }

    function openClearModal() {
      if (!state.records.length) return;
      els.clearModal.classList.add('open');
    }

    function closeClearModal() {
      els.clearModal.classList.remove('open');
    }

    function clearAllRecords() {
      if (!state.records.length) return;
      state.records = [];
      state.activeId = null;
      state.codes.clear();
      state.renderedSecond = -1;
      persistRecords();
      closeClearModal();
      render();
      showToast('历史记录已清空');
    }

    function exportAllRecords() {
      if (!state.records.length) {
        showToast('没有可导出的历史记录');
        return;
      }

      const content = state.records.map(buildOtpAuth).join('\n');
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `2fa-totp-${formatExportTimestamp()}.txt`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 1000);
      showToast(`已导出 ${state.records.length} 条`);
    }

    function formatExportTimestamp(date = new Date()) {
      const pad = (value) => String(value).padStart(2, '0');
      return `${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}-${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}`;
    }

    function renderRoute() {
      const apiMode = window.location.hash === '#api';
      els.homeView.classList.toggle('hidden', apiMode);
      els.apiView.classList.toggle('active', apiMode);
      if (apiMode) renderApiExamples();
    }

    function renderApiExamples() {
      const active = getActiveRecord();
      const base = window.location.protocol === 'file:'
        ? 'https://your-domain.example'
        : `${window.location.origin}${window.location.pathname}`;
      const secret = active?.secret || 'JBSWY3DPEHPK3PXP';
      const otpAuth = active ? buildOtpAuth(active) : 'otpauth://totp/Demo?secret=JBSWY3DPEHPK3PXP&issuer=Demo';
      const textUrl = `${base}?secret=${encodeURIComponent(secret)}&format=text`;
      const jsonUrl = `${base}?secret=${encodeURIComponent(secret)}&format=json`;
      const otpAuthUrl = `${base}?url=${encodeURIComponent(otpAuth)}&format=otpauth`;
      const autoTextUrl = `${base}?secret=${encodeURIComponent(secret)}`;
      const acceptJsonUrl = `${base}?secret=${encodeURIComponent(secret)}`;
      const curlSecret = `curl "${textUrl}"`;
      const curlJson = `curl "${jsonUrl}"`;
      const curlOtpAuth = `curl "${otpAuthUrl}"`;
      const curlAutoText = `curl "${autoTextUrl}"`;
      const curlAcceptJson = `curl -H "Accept: application/json" "${acceptJsonUrl}"`;
      const fetchExample = `const code = await fetch("${textUrl}")\n  .then((res) => res.text());\nconsole.log(code);`;

    function handleRecordAction(event) {

      button.blur();

      const id = button.dataset.id;
      const record = state.records.find((item) => item.id === id);
      if (!record) return;

      if (action === 'activate') {
        setActive(id);
        return;
      }
      if (action === 'copy-code') {
        copyText(state.codes.get(id) || '').then(() => showToast('验证码已复制'));
        return;

      if (action === 'copy-secret') {
        copyText(record.secret).then(() => {
          flashCopied(button);

        return;

      if (action === 'edit') {

        return;

        deleteRecord(id);
      }

    function importFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const incoming = params.get('url') || params.get('otpauth') || params.get('otp') || params.get('secret');
      if (!incoming) return;
      try {
        saveRecord(parseInput(incoming, params));
        const clean = `${window.location.pathname}${window.location.hash || ''}`;
        window.history.replaceState({}, '', clean);
        showToast('已从 URL 导入');
      } catch (error) {
        showToast(error.message || 'URL 参数无法解析');
      }
    }

    function parseInput(raw, extraParams = null) {
      const text = String(raw || '').trim();
      if (!text) throw new Error('请输入 Secret 或 otpauth 链接');
      const decodedText = safeDecode(text);

      if (decodedText.toLowerCase().startsWith('otpauth://')) {
        return parseOtpAuth(decodedText);
      }

      const urlRecord = parseUrlLike(decodedText);
      if (urlRecord) return urlRecord;

      const params = extraParams || parseSearchParams(decodedText);
      if (params) {
        const nested = params.get('url') || params.get('otpauth') || params.get('otp');
        if (nested) return parseInput(nested);
        const secret = params.get('secret');
        if (secret) {
          return {
            label: params.get('label') || params.get('account') || '',
            issuer: params.get('issuer') || '',
            secret,
            digits: Number(params.get('digits') || 6),
            period: Number(params.get('period') || 30),
            algorithm: params.get('algorithm') || 'SHA1'
          };
        }
      }

      return {
        label: '',
        issuer: '',
        secret: decodedText,
        digits: 6,
        period: 30,
        algorithm: 'SHA1'
      };
    }

    function parseOtpAuth(raw) {
      let url;
      try {
        url = new URL(raw);
      } catch {
        throw new Error('otpauth 链接格式不正确');
      }
      const secret = url.searchParams.get('secret');
      if (!secret) throw new Error('otpauth 链接缺少 secret');

      const labelRaw = decodeURIComponent(url.pathname.replace(/^\/+/, '')) || 'TOTP';
      const issuerParam = url.searchParams.get('issuer') || '';
      let issuer = issuerParam;
      let label = labelRaw;
      if (labelRaw.includes(':')) {
        const parts = labelRaw.split(':');
        const prefix = parts.shift().trim();
        if (!issuer) issuer = prefix;
        if (issuer === prefix) label = parts.join(':').trim();
      }

      return {
        label: label || issuer || 'TOTP',
        issuer,
        secret,
        digits: Number(url.searchParams.get('digits') || 6),
        period: Number(url.searchParams.get('period') || 30),
        algorithm: url.searchParams.get('algorithm') || 'SHA1'
      };
    }

    function parseUrlLike(text) {
      try {
        const url = new URL(text);
        const nested = url.searchParams.get('url') || url.searchParams.get('otpauth') || url.searchParams.get('otp');
        if (nested) return parseInput(nested);
        const secret = url.searchParams.get('secret');
        if (!secret) return null;
        return {
          label: url.searchParams.get('label') || url.searchParams.get('account') || '',
          issuer: url.searchParams.get('issuer') || '',
          secret,
          digits: Number(url.searchParams.get('digits') || 6),
          period: Number(url.searchParams.get('period') || 30),
          algorithm: url.searchParams.get('algorithm') || 'SHA1'
        };
      } catch {
        return null;
      }
    }

    function parseSearchParams(text) {
      const trimmed = text.replace(/^\?/, '');
      if (!trimmed.includes('=')) return null;
      return new URLSearchParams(trimmed);
    }

    async function openScanModal() {
      if (!canUseLiveCamera()) {
        if (shouldUseCameraCaptureFallback()) {
          openCameraCapture('当前浏览器不支持实时扫描，改用系统相机拍照扫描');
        } else {
          showToast('当前浏览器无法直接打开相机，请检查权限或用 HTTPS 访问');
        }
        return;
      }

      try {
        const token = state.scanToken + 1;
        state.scanToken = token;
        els.scanStatus.textContent = '正在打开相机...';
        els.scanModal.classList.add('open');
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: 'environment' }
          },
          audio: false
        });
        if (token !== state.scanToken || !els.scanModal.classList.contains('open')) {
          stream.getTracks().forEach((track) => track.stop());
          return;
        }
        state.scanStream = stream;
        els.scanVideo.srcObject = stream;
        await els.scanVideo.play();
        els.scanStatus.textContent = '将二维码放入取景框，识别成功后会自动导入。';
        scanVideoFrame();
      } catch (error) {
        closeScanModal();
        if (error?.name === 'NotAllowedError' || error?.name === 'SecurityError') {
          showToast('相机权限受限，请允许权限后重试');
        } else if (shouldUseCameraCaptureFallback()) {
          openCameraCapture('实时扫描不可用，改用系统相机拍照扫描');
        } else {
          showToast('无法打开相机，请检查浏览器权限');
        }
      }
    }

    function canUseLiveCamera() {
      return Boolean(navigator.mediaDevices && typeof navigator.mediaDevices.getUserMedia === 'function');
    }

    function shouldUseCameraCaptureFallback() {
      const ua = navigator.userAgent || navigator.vendor || '';
      const isMobile = /Android|iPhone|iPad|iPod|Mobile|Windows Phone/i.test(ua) ||
        (navigator.maxTouchPoints > 1 && /Macintosh/i.test(ua));
      return Boolean(isMobile && els.cameraInput);
    }

    function openCameraCapture(message = '使用系统相机拍照扫描') {
      showToast(message);
      openFilePicker(els.cameraInput);
    }

      input.value = '';

    function closeScanModal() {
      state.scanToken += 1;
      if (state.scanRaf) {
        cancelAnimationFrame(state.scanRaf);
        state.scanRaf = 0;
      }
      if (state.scanStream) {
        state.scanStream.getTracks().forEach((track) => track.stop());
        state.scanStream = null;
      }
      state.scanBusy = false;
      els.scanVideo.srcObject = null;
      els.scanStatus.textContent = '请允许浏览器使用相机，然后把二维码放入取景框。';
      els.scanModal.classList.remove('open');
    }

    async function scanVideoFrame() {
      if (!state.scanStream || state.scanBusy) {
        state.scanRaf = requestAnimationFrame(scanVideoFrame);
        return;
      }
      if (!els.scanVideo.videoWidth || !els.scanVideo.videoHeight) {
        state.scanRaf = requestAnimationFrame(scanVideoFrame);
        return;
      }

      state.scanBusy = true;
      try {
        const content = await decodeQrFromVideo(els.scanVideo);
        if (content) {
          closeScanModal();
          addFromText(content);
          return;
        }
      } catch {
        els.scanStatus.textContent = '正在识别...';
      } finally {
        state.scanBusy = false;
      }

      if (state.scanStream) {
        state.scanRaf = requestAnimationFrame(scanVideoFrame);
      }
    }

    async function decodeQrFromImage(file) {
      const source = await loadImageSource(file);
      const maxSize = 1800;
      const scale = Math.min(1, maxSize / Math.max(source.width, source.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.max(1, Math.round(source.width * scale));
      canvas.height = Math.max(1, Math.round(source.height * scale));
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(source.image, 0, 0, canvas.width, canvas.height);
      source.close?.();
      return decodeQrFromCanvas(canvas);
    }

    async function loadImageSource(file) {
      if (typeof createImageBitmap === 'function') {
        try {
          const bitmap = await createImageBitmap(file);
          return {
            image: bitmap,
            width: bitmap.width,
            height: bitmap.height,
            close: () => bitmap.close?.()
          };
        } catch {
          // Fall through to HTMLImageElement for mobile browser compatibility.
        }
      }

      const url = URL.createObjectURL(file);
      try {
        const image = await new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = () => reject(new Error('图片读取失败'));
          img.src = url;
        });
        return {
          image,
          width: image.naturalWidth || image.width,
          height: image.naturalHeight || image.height,
          close: () => URL.revokeObjectURL(url)
        };
      } catch (error) {
        URL.revokeObjectURL(url);
        throw error;
      }
    }

    async function decodeQrFromVideo(video) {
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      return decodeQrFromCanvas(canvas);
    }

    async function decodeQrFromCanvas(canvas) {
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      if ('BarcodeDetector' in window) {
        try {
          const detector = state.scanDetector || new BarcodeDetector({ formats: ['qr_code'] });
          state.scanDetector = detector;
          const results = await detector.detect(canvas);
          if (results[0]?.rawValue) return results[0].rawValue;
        } catch {
          state.scanDetector = null;
        }
      }

      await ensureJsQr();
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const result = window.jsQR(imageData.data, imageData.width, imageData.height);
      if (result?.data) return result.data;
      throw new Error('没有识别到二维码');
    }

    function ensureJsQr() {
      if (window.jsQR) return Promise.resolve();
      return loadScript(JSQR_URL, () => window.jsQR);

    function drawQrToCanvas(canvas, text) {
      const qr = window.qrcode(0, 'M');
      qr.addData(text);
      qr.make();
      const count = qr.getModuleCount();
      const size = Math.min(canvas.width, canvas.height);
      const quiet = 4;
      const moduleSize = Math.floor(size / (count + quiet * 2));
      const totalSize = moduleSize * (count + quiet * 2);
      const startX = Math.floor((canvas.width - totalSize) / 2) + quiet * moduleSize;
      const startY = Math.floor((canvas.height - totalSize) / 2) + quiet * moduleSize;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#111827';
      for (let row = 0; row < count; row += 1) {
        for (let col = 0; col < count; col += 1) {
          if (qr.isDark(row, col)) {
            ctx.fillRect(
              startX + col * moduleSize,
              startY + row * moduleSize,
              moduleSize,
              moduleSize
            );
          }
        }
      }
    }

    function loadScript(src, ready) {
      return new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[src="${src}"]`);
        if (existing) {
          existing.addEventListener('load', () => ready() ? resolve() : reject(new Error('脚本加载失败')), { once: true });
          existing.addEventListener('error', () => reject(new Error('脚本加载失败')), { once: true });
          return;
        }
        const script = document.createElement('script');
        script.src = src;
        script.async = true;
        script.onload = () => ready() ? resolve() : reject(new Error('脚本加载失败'));
        script.onerror = () => reject(new Error('脚本加载失败'));
        document.head.appendChild(script);
      });
    }

    async function generateTotp(secret, options = {}, time = Date.now()) {
      const period = Number(options.period || 30);
      const digits = Number(options.digits || 6);
      const algorithm = String(options.algorithm || 'SHA1').toUpperCase();
      const counter = Math.floor(time / 1000 / period);
      const keyBytes = base32Decode(secret);
      const counterBytes = new ArrayBuffer(8);
      const view = new DataView(counterBytes);
      view.setUint32(4, counter, false);
      const key = await crypto.subtle.importKey('raw', keyBytes, { name: 'HMAC', hash: algorithm.replace('SHA', 'SHA-') }, false, ['sign']);
      const signature = new Uint8Array(await crypto.subtle.sign('HMAC', key, counterBytes));
      const offset = signature[signature.length - 1] & 0x0f;
      const binary = ((signature[offset] & 0x7f) << 24) |
        ((signature[offset + 1] & 0xff) << 16) |
        ((signature[offset + 2] & 0xff) << 8) |
        (signature[offset + 3] & 0xff);
      const otp = binary % (10 ** digits);
      return String(otp).padStart(digits, '0');
    }

    function base32Decode(secret) {
      const clean = normalizeSecret(secret);
      assertSecret(clean);
      const alphabet = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
      let bits = '';
      for (const char of clean) {
        const value = alphabet.indexOf(char);
        if (value < 0) throw new Error('Secret 不是有效的 Base32');
        bits += value.toString(2).padStart(5, '0');
      }
      const bytes = [];
      for (let i = 0; i + 8 <= bits.length; i += 8) {
        bytes.push(parseInt(bits.slice(i, i + 8), 2));
      }
      return new Uint8Array(bytes);
    }

    function buildOtpAuth(record) {
      const issuerPrefix = record.issuer ? `${record.issuer}:` : '';
      const labelName = record.label || record.issuer || 'Secret';
      const label = encodeURIComponent(`${issuerPrefix}${labelName}`);
      const params = new URLSearchParams({
        secret: normalizeSecret(record.secret),
        issuer: record.issuer || '',
        algorithm: record.algorithm || 'SHA1',
        digits: String(record.digits || 6),
        period: String(record.period || 30)
      });
      return `otpauth://totp/${label}?${params.toString()}`;
    }

    function buildShareLink(record) {
      const base = window.location.protocol === 'file:'
        ? window.location.href.split('?')[0].split('#')[0]
        : `${window.location.origin}${window.location.pathname}`;
      return `${base}?url=${encodeURIComponent(buildOtpAuth(record))}`;
    }

    function loadRecords() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return [];
        const json = utf8FromBase64(raw);
        const records = JSON.parse(json);
        if (!Array.isArray(records)) return [];
        return records.map((record) => ({ ...record, secret: normalizeSecret(record.secret) })).filter((record) => {
          try {
            assertSecret(record.secret);
            return true;
          } catch {
            return false;
          }
        });
      } catch {
        return [];
      }
    }

    function persistRecords() {
      try {
        localStorage.setItem(STORAGE_KEY, base64FromUtf8(JSON.stringify(state.records)));
      } catch {
        showToast('localStorage 写入失败');
      }
    }

    function normalizeSecret(secret) {
      return String(secret || '').toUpperCase().replace(/[\s=-]/g, '');
    }

    function assertSecret(secret) {
      if (!secret || secret.length < 8) throw new Error('Secret 太短');
      if (!/^[A-Z2-7]+$/.test(secret)) throw new Error('Secret 只能包含 Base32 字符 A-Z 和 2-7');
    }

    function recordKey(record) {
      return `${normalizeSecret(record.secret)}|${record.issuer || ''}|${record.label || ''}`;
    }

    function getActiveRecord() {
      return state.records.find((item) => item.id === state.activeId) || state.records[0] || null;
    }

    function getRemainingSeconds(record, time = Date.now()) {
      const period = Number(record?.period || 30);
      const elapsed = (time / 1000) % period;
      return Math.ceil(Math.max(0, period - elapsed));
    }

    async function copyText(text) {
      if (!text) return;
      if (navigator.clipboard?.writeText && window.isSecureContext) {
        await navigator.clipboard.writeText(text);
        window.getSelection()?.removeAllRanges();
        return;
      }
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.setAttribute('readonly', '');
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      window.getSelection()?.removeAllRanges();
      textarea.remove();
    }

    function flashCopied(element) {
      element.classList.add('copied');
      window.setTimeout(() => element.classList.remove('copied'), 900);
    }

    function showToast(message) {
      window.clearTimeout(state.toastTimer);
      els.toast.textContent = message;
      els.toast.classList.add('show');
      state.toastTimer = window.setTimeout(() => els.toast.classList.remove('show'), 1800);
    }

    function safeDecode(text) {
      try {
        return decodeURIComponent(text);
      } catch {
        return text;
      }
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      })[char]);
    }

    function base64FromUtf8(text) {
      const bytes = new TextEncoder().encode(text);
      let binary = '';
      for (let i = 0; i < bytes.length; i += 0x8000) {
        binary += String.fromCharCode(...bytes.slice(i, i + 0x8000));
      }
      return btoa(binary);
    }

    function utf8FromBase64(text) {
      const binary = atob(text);
      const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }
  </script>
</body>
