<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#0f9f8f">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/images/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="apple-mobile-web-app-title" content="2FA TOTP">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>2FA TOTP</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <main class="app">
    <div id="homeView" class="home-view">
    <section class="hero" aria-label="导入 2FA" data-i18n-attr="aria-label:import2fa">
      <label class="language-picker">
        <span class="language-icon" title="语言" aria-hidden="true" data-i18n-attr="title:languageLabel">
          <svg viewBox="0 0 24 24">
            <path d="m5 8 6 6"></path>
            <path d="m4 14 6-6 2-3"></path>
            <path d="M2 5h12"></path>
            <path d="M7 2h1"></path>
            <path d="m22 22-5-10-5 10"></path>
            <path d="M14 18h6"></path>
          </svg>
        </span>
        <select id="languageSelect" aria-label="语言" data-i18n-attr="aria-label:languageLabel">
          <option value="zh-CN">中文</option>
          <option value="en-US">English</option>
          <option value="es-ES">Español</option>
          <option value="hi-IN">हिन्दी</option>
          <option value="pt-BR">Português</option>
        </select>
      </label>
      <img class="brand-icon" src="assets/images/icon-192.png" width="58" height="58" alt="" aria-hidden="true">
      <h1 class="brand">2FA TOTP</h1>
      <div class="search-wrap">
        <input id="secretInput" class="search-input" spellcheck="false" autocomplete="off" placeholder="支持 Secret / otpauth / 二维码" data-i18n-attr="placeholder:inputPlaceholder">
        <div class="search-actions">
          <button id="scanBtn" class="icon-btn" type="button" title="扫描二维码" aria-label="扫描二维码" data-i18n-attr="title:scanQr;aria-label:scanQr">
            <svg class="icon" viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 0 1 2-2h2"></path><path d="M17 3h2a2 2 0 0 1 2 2v2"></path><path d="M21 17v2a2 2 0 0 1-2 2h-2"></path><path d="M7 21H5a2 2 0 0 1-2-2v-2"></path><path d="M7 8h10"></path><path d="M7 12h10"></path><path d="M7 16h6"></path></svg>
          </button>
          <button id="imageBtn" class="icon-btn" type="button" title="读取二维码图片" aria-label="读取二维码图片" data-i18n-attr="title:readQrImage;aria-label:readQrImage">
            <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"></rect><circle cx="8.5" cy="10.5" r="1.5"></circle><path d="m21 15-5-5L5 19"></path></svg>
          </button>
          <button id="parseBtn" class="icon-btn" type="button" title="解析" aria-label="解析" data-i18n-attr="title:parse;aria-label:parse">
            <svg class="icon" viewBox="0 0 24 24"><path d="M5 12h14"></path><path d="m13 6 6 6-6 6"></path></svg>
          </button>
        </div>
        <input id="qrInput" class="file-input" type="file" accept="image/*" aria-hidden="true" tabindex="-1">
        <input id="cameraInput" class="file-input" type="file" accept="image/*" capture="environment" aria-hidden="true" tabindex="-1">
      </div>
    </section>

    <section id="currentPanel" class="current" aria-label="当前验证码" data-i18n-attr="aria-label:currentCode">
      <div class="empty" data-i18n="emptyState">输入或扫码导入后，验证码会显示在这里。密钥只保存在当前浏览器。</div>
    </section>

    <section class="history" aria-label="历史记录" data-i18n-attr="aria-label:history">
      <div class="history-head">
        <h2 data-i18n="history">历史记录</h2>
        <div class="history-tools">
          <span id="recordCount">0 条</span>
          <button id="clearRecords" class="icon-btn danger" type="button" title="清空历史记录" aria-label="清空历史记录" disabled data-i18n-attr="title:clearHistory;aria-label:clearHistory">
            <svg class="icon" viewBox="0 0 24 24"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="m19 6-1 14H6L5 6"></path><path d="M10 11v5"></path><path d="M14 11v5"></path></svg>
          </button>
          <button id="exportRecords" class="icon-btn" type="button" title="导出历史记录" aria-label="导出历史记录" hidden data-i18n-attr="title:exportHistory;aria-label:exportHistory">
            <svg class="icon" viewBox="0 0 24 24"><path d="M12 3v12"></path><path d="m7 10 5 5 5-5"></path><path d="M5 21h14"></path></svg>
          </button>
        </div>
      </div>
      <div id="records" class="records"></div>
    </section>
    <div class="home-footer">
      <div class="footer-tags" aria-label="工具特点" data-i18n-attr="aria-label:features">
        <span class="feature-tag" data-i18n="featureLocal">本地解析</span>
        <span class="feature-tag" data-i18n="featureScan">快速扫码</span>
        <span class="feature-tag" data-i18n="featureBatch">多行批量导入</span>
        <span class="feature-tag" data-i18n="featureStorage">浏览器内保存</span>
      </div>
      <div class="footer-links">
        <button id="apiLink" class="api-link" type="button" data-i18n="apiExamples">API 调用示例</button>
        <a class="footer-link" href="https://github.com/Zhu-junwei/2fa" target="_blank" rel="noreferrer">
          <svg class="github-mark" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.011-1.232-.017-2.235-3.338.724-4.042-1.416-4.042-1.416-.546-1.386-1.333-1.755-1.333-1.755-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.236 1.839 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.775.418-1.305.762-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.468-2.381 1.235-3.221-.124-.303-.535-1.523.117-3.176 0 0 1.008-.322 3.301 1.23A11.5 11.5 0 0 1 12 6.098c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.873.119 3.176.769.84 1.234 1.911 1.234 3.221 0 4.609-2.807 5.625-5.479 5.921.43.372.823 1.102.823 2.222 0 1.605-.015 2.898-.015 3.293 0 .322.216.696.825.578C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path></svg>
          GitHub
        </a>
      </div>
    </div>
    </div>

    <section id="apiView" class="api-view" aria-label="API 调用示例" data-i18n-attr="aria-label:apiExamples">
      <div class="api-top">
        <h2 data-i18n="apiExamples">API 调用示例</h2>
        <button id="backHome" class="text-btn" type="button" data-i18n="back">返回</button>
      </div>
      <div id="apiExamples"></div>
    </section>
  </main>

  <div id="qrModal" class="modal" role="dialog" aria-modal="true" aria-label="2FA 二维码" data-i18n-attr="aria-label:qrDialog">
    <div class="qr-panel">
      <div class="qr-head">
        <strong id="qrTitle">二维码</strong>
        <button id="qrClose" class="icon-btn" type="button" title="关闭" aria-label="关闭二维码" data-i18n-attr="title:close;aria-label:closeQr">
          <svg class="icon" viewBox="0 0 24 24"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
        </button>
      </div>
      <canvas id="qrCanvas" width="300" height="300"></canvas>
      <div class="copy-list">
        <button id="qrSecret" class="copy-row" type="button"><span>Secret</span><code></code></button>
        <button id="qrOtpAuth" class="copy-row" type="button"><span>otpauth</span><code></code></button>
      </div>
      <div class="hint" data-i18n="qrHint">用其他 2FA 工具扫描即可导入原始 otpauth 配置。</div>
    </div>
  </div>

  <div id="editModal" class="modal" role="dialog" aria-modal="true" aria-label="编辑 2FA" data-i18n-attr="aria-label:edit2fa">
    <form id="editForm" class="edit-panel">
      <div class="qr-head">
        <strong data-i18n="edit2fa">编辑 2FA</strong>
        <button id="editClose" class="icon-btn" type="button" title="关闭" aria-label="关闭编辑" data-i18n-attr="title:close;aria-label:closeEdit">
          <svg class="icon" viewBox="0 0 24 24"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
        </button>
      </div>
      <div class="field-grid">
        <label><span data-i18n="name">名称</span><input id="editLabel" autocomplete="off"></label>
        <label>Issuer<input id="editIssuer" autocomplete="off"></label>
        <label>Secret<input id="editSecret" autocomplete="off" spellcheck="false"></label>
        <label><span data-i18n="digits">位数</span><input id="editDigits" type="number" min="6" max="8" step="1"></label>
        <label><span data-i18n="period">周期</span><input id="editPeriod" type="number" min="10" step="1"></label>
        <label><span data-i18n="algorithm">算法</span><select id="editAlgorithm"><option>SHA1</option><option>SHA256</option><option>SHA512</option></select></label>
      </div>
      <div class="edit-actions">
        <button id="editCancel" class="text-btn" type="button" data-i18n="cancel">取消</button>
        <button class="text-btn primary" type="submit" data-i18n="save">保存</button>
      </div>
    </form>
  </div>

  <div id="clearModal" class="modal" role="dialog" aria-modal="true" aria-label="清空历史记录" data-i18n-attr="aria-label:clearHistory">
    <div class="confirm-panel">
      <div class="qr-head">
        <strong data-i18n="clearHistory">清空历史记录</strong>
        <button id="clearClose" class="icon-btn" type="button" title="关闭" aria-label="关闭清空确认" data-i18n-attr="title:close;aria-label:closeClear">
          <svg class="icon" viewBox="0 0 24 24"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
        </button>
      </div>
      <p data-i18n="clearConfirmText">这会删除当前浏览器里保存的所有 2FA 记录。需要保留的话，可以先导出。</p>
      <div class="edit-actions">
        <button id="clearCancel" class="text-btn" type="button" data-i18n="cancel">取消</button>
        <button id="clearConfirm" class="text-btn primary" type="button" data-i18n="clear">清空</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="scanModal" class="modal" role="dialog" aria-modal="true" aria-label="扫描二维码" data-i18n-attr="aria-label:scanQr">
    <div class="scan-panel">
      <div class="qr-head">
        <strong data-i18n="scanQr">扫描二维码</strong>
        <button id="scanClose" class="icon-btn" type="button" title="关闭" aria-label="关闭扫描" data-i18n-attr="title:close;aria-label:closeScan">
          <svg class="icon" viewBox="0 0 24 24"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>
        </button>
      </div>
      <div class="scan-video-wrap">
        <video id="scanVideo" class="scan-video" autoplay muted playsinline></video>
      </div>
      <div id="scanStatus" class="hint" data-i18n="scanStatusDefault">请允许浏览器使用相机，然后把二维码放入取景框。</div>
    </div>
  </div>

  <script src="totp-core.js"></script>
  <script src="assets/locales.js"></script>
  <script src="assets/icons.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
